<svg width="1400" height="750" viewBox="0 0 1400 750" xmlns="http://www.w3.org/2000/svg">

    <defs>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
        </filter>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#94A3B8"/>
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#ffffff"/>
    <text x="700" y="30" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6" text-anchor="middle">API Client and Streaming Pipeline</text>

    <!-- === Column 1: Request Assembly === -->
    <text x="50" y="65" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3B82F6">Request Assembly</text>

    <rect x="50" y="80" width="300" height="50" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="105" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">User Input</text>
    <text x="200" y="122" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Query + Context</text>

    <line x1="200" y1="130" x2="200" y2="145" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="50" y="145" width="300" height="55" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="168" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">System Prompt</text>
    <text x="200" y="186" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Normalization, cache boundary</text>

    <line x1="200" y1="200" x2="200" y2="215" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="50" y="215" width="300" height="55" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="238" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Tool Definitions</text>
    <text x="200" y="256" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">parseSchemas(), change detection</text>

    <line x1="200" y1="270" x2="200" y2="285" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="50" y="285" width="300" height="55" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="308" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Message History</text>
    <text x="200" y="326" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">stripImages(), attachments</text>

    <line x1="200" y1="340" x2="200" y2="355" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="50" y="355" width="300" height="55" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="378" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Prompt Cache</text>
    <text x="200" y="396" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">detectSystemChange(), Token analytics</text>

    <!-- Column 1 -> Column 2 connecting arrow -->
    <line x1="350" y1="250" x2="390" y2="250" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

    <!-- === Column 2: Provider Routing === -->
    <text x="390" y="65" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#8B5CF6">Provider Routing</text>

    <rect x="390" y="80" width="300" height="120" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="540" y="103" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Provider Selection</text>
    <text x="540" y="121" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">API Key - 1P</text>
    <text x="540" y="137" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">OAuth - 1P</text>
    <text x="540" y="153" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Bedrock - AWS</text>
    <text x="540" y="169" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Vertex - Google</text>
    <text x="540" y="185" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Foundry - Azure</text>

    <line x1="540" y1="200" x2="540" y2="220" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="390" y="220" width="300" height="50" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="540" y="243" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">client.ts Factory</text>
    <text x="540" y="261" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#666666" font-style="italic">createClient(provider...)</text>

    <!-- Column 2 -> Column 3 connecting arrow -->
    <line x1="690" y1="150" x2="730" y2="150" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

    <!-- === Column 3: Streaming Engine === -->
    <text x="730" y="65" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3B82F6">Streaming Engine</text>

    <rect x="730" y="80" width="300" height="100" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="880" y="103" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">claude.ts Generator</text>
    <text x="880" y="121" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">async *yieldMessages()</text>
    <text x="880" y="137" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">POST /messages stream</text>
    <text x="880" y="153" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">SSE chunk parsing</text>

    <line x1="880" y1="180" x2="880" y2="200" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="730" y="200" width="300" height="50" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
    <text x="880" y="223" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Token Counting</text>
    <text x="880" y="241" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#666666" font-style="italic">input/output/cache</text>

    <line x1="880" y1="250" x2="880" y2="270" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="730" y="270" width="300" height="50" rx="12" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" filter="url(#shadow)"/>
    <text x="880" y="293" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Tool Invocation</text>
    <text x="880" y="311" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#666666" font-style="italic">handleToolUse()</text>

    <!-- Column 3 -> Column 4 connecting arrow -->
    <line x1="1030" y1="150" x2="1070" y2="150" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

    <!-- === Column 4: Error and Retry === -->
    <text x="1070" y="65" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#EF4444">Error and Retry</text>

    <rect x="1070" y="80" width="300" height="70" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="1220" y="105" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">withRetry.ts</text>
    <text x="1220" y="123" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">BASE_DELAY: 1000ms</text>
    <text x="1220" y="139" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">MAX_RETRIES: 6</text>

    <line x1="1220" y1="150" x2="1220" y2="170" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="1070" y="170" width="300" height="90" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="1220" y="195" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Error Classification</text>
    <text x="1220" y="213" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">PromptTooLong compact</text>
    <text x="1220" y="229" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">429 backoff</text>
    <text x="1220" y="245" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">529 3 retries</text>

    <line x1="1220" y1="260" x2="1220" y2="280" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="1070" y="280" width="300" height="60" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
    <text x="1220" y="305" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Session Persistence</text>
    <text x="1220" y="325" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333333">UUID idempotency, OpenTelemetry</text>

    <!-- === Pipeline Stages (moved up, connected) === -->
    <text x="50" y="490" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3B82F6">Pipeline Stages:</text>

    <circle cx="200" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="200" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">1</text>
    <text x="200" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Normalize</text>
    <line x1="215" y1="510" x2="305" y2="510" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="320" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="320" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">2</text>
    <text x="320" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Build</text>
    <line x1="335" y1="510" x2="425" y2="510" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="440" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="440" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">3</text>
    <text x="440" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Route</text>
    <line x1="455" y1="510" x2="545" y2="510" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="560" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="560" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">4</text>
    <text x="560" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Stream</text>
    <line x1="575" y1="510" x2="665" y2="510" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="680" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="680" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">5</text>
    <text x="680" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Parse</text>
    <line x1="695" y1="510" x2="785" y2="510" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="800" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="800" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">6</text>
    <text x="800" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Execute</text>
    <line x1="815" y1="510" x2="905" y2="510" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="920" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="920" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">7</text>
    <text x="920" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Retry</text>
    <line x1="935" y1="510" x2="1025" y2="510" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="1040" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="1040" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">8</text>
    <text x="1040" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Persist</text>
    <line x1="1055" y1="510" x2="1145" y2="510" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <circle cx="1160" cy="510" r="15" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="1160" y="515" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">9</text>
    <text x="1160" y="540" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Return</text>

</svg>
