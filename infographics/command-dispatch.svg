<svg width="1400" height="780" viewBox="0 0 1400 780" xmlns="http://www.w3.org/2000/svg">

    <defs>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
        </filter>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#94A3B8"/>
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#ffffff"/>
    <text x="700" y="40" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Command Dispatch Pipeline</text>
    <text x="60" y="100" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Input Parse</text>
    <rect x="60" y="130" width="220" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="170.0" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">PromptInput</text>
    <text x="170.0" y="175" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">User types command</text>
    <text x="170.0" y="191" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">Keypress - onKeyDown</text>
    <line x1="290" y1="165" x2="360" y2="165" stroke="#94A3B8" stroke-width="2" stroke-dasharray="none" marker-end="url(#arrowhead)"/>
    <rect x="360" y="130" width="140" height="70" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
    <text x="430.0" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Parse</text>
    <text x="430.0" y="175" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">Split whitespace</text>
    <text x="430.0" y="191" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">cmd = first token</text>
    <text x="600" y="100" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Search (150 Commands)</text>
    <line x1="510" y1="165" x2="590" y2="165" stroke="#94A3B8" stroke-width="2" stroke-dasharray="none" marker-end="url(#arrowhead)"/>
    <rect x="590" y="130" width="180" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="680.0" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Search COMMANDS</text>
    <text x="680.0" y="175" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">110 built-in</text>
    <text x="680.0" y="191" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">+ Skills, Plugins</text>
    <line x1="780" y1="165" x2="850" y2="165" stroke="#94A3B8" stroke-width="2" stroke-dasharray="none" marker-end="url(#arrowhead)"/>
    <rect x="850" y="130" width="140" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="920.0" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Match</text>
    <text x="920.0" y="175" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">name equals input</text>
    <text x="920.0" y="191" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">aliases check</text>
    <line x1="500" y1="200" x2="500" y2="250" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <text x="60" y="250" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#F97316">Filter Chain (5 Stages)</text>
    <rect x="60" y="290" width="130" height="50" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
    <text x="125.0" y="315" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">isEnabled()</text>
    <line x1="195" y1="315" x2="215" y2="315" stroke="#94A3B8" stroke-width="2" stroke-dasharray="none" marker-end="url(#arrowhead)"/>
    <rect x="235" y="290" width="130" height="50" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
    <text x="300.0" y="315" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">isHidden</text>
    <line x1="370" y1="315" x2="390" y2="315" stroke="#94A3B8" stroke-width="2" stroke-dasharray="none" marker-end="url(#arrowhead)"/>
    <rect x="410" y="290" width="130" height="50" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
    <text x="475.0" y="315" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Availability</text>
    <line x1="545" y1="315" x2="565" y2="315" stroke="#94A3B8" stroke-width="2" stroke-dasharray="none" marker-end="url(#arrowhead)"/>
    <rect x="585" y="290" width="130" height="50" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
    <text x="650.0" y="315" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Features</text>
    <line x1="720" y1="315" x2="740" y2="315" stroke="#94A3B8" stroke-width="2" stroke-dasharray="none" marker-end="url(#arrowhead)"/>
    <rect x="760" y="290" width="130" height="50" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
    <text x="825.0" y="315" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Permission</text>
    <line x1="500" y1="340" x2="500" y2="420" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <text x="60" y="420" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Type Dispatch (3 Paths)</text>
    <rect x="60" y="460" width="200" height="100" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
    <text x="160.0" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Type: prompt</text>
    <text x="160.0" y="505" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">Inject into model</text>
    <text x="160.0" y="521" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">Model processes</text>
    <text x="160.0" y="537" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">ALWAYS SAFE</text>
    <rect x="310" y="460" width="200" height="100" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="410.0" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Type: local</text>
    <text x="410.0" y="505" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">load() call(args)</text>
    <text x="410.0" y="521" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">Returns result</text>
    <text x="410.0" y="537" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">NEEDS ALLOWLIST</text>
    <rect x="560" y="460" width="200" height="100" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="660.0" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Type: local-jsx</text>
    <text x="660.0" y="505" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">React component</text>
    <text x="660.0" y="521" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">Render as modal</text>
    <text x="660.0" y="537" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">ALWAYS BLOCKED</text>
    <line x1="410" y1="560" x2="410" y2="630" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <text x="60" y="630" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#10B981">21 Approved Local Commands</text>
    <rect x="60" y="660" width="1280" height="80" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
    <text x="700" y="685" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333333">Git: commit, push, pr | Shell: bash, node, python | File: read, write, edit</text>

</svg>