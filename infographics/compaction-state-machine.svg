<?xml version="1.0" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1240" width="1400px" height="1240px" style="background-color: #ffffff">
  <defs>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset in="SourceGraphic" dx="0" dy="2"/>
      <feGaussianBlur in="offsetblur" stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94A3B8"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#EF4444"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#06B6D4"/>
    </marker>
  </defs>
  <text x="30" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Context Compaction State Machine</text>
  <text x="30" y="100" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Token Monitoring</text>
  <rect x="30" y="130" width="280" height="180" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="170" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Context Gauge</text>
  <text x="45" y="172" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Safe (green zone)</text>
  <text x="45" y="188" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Warning (yellow)</text>
  <text x="45" y="204" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Error (orange)</text>
  <text x="45" y="220" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Critical (red)</text>
  <rect x="350" y="130" width="280" height="180" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="490" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Constants</text>
  <text x="365" y="172" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">MAX_OUTPUT = 20K</text>
  <text x="365" y="188" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">AUTOCOMPACT = 13K</text>
  <text x="365" y="204" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">WARNING = 20K</text>
  <text x="365" y="220" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">ERROR = 20K</text>
  <text x="30" y="360" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#10B981">Compaction Strategies</text>
  <rect x="30" y="400" width="260" height="160" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="160" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Strategy 1: Time-Based</text>
  <text x="45" y="442" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Gap &gt; 60 min</text>
  <text x="45" y="458" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Keep last 5 messages</text>
  <text x="45" y="474" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Runs BEFORE callModel()</text>
  <rect x="320" y="400" width="260" height="160" rx="12" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="450" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Strategy 2: Cached</text>
  <text x="335" y="442" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">cache_edits parameter</text>
  <text x="335" y="458" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Server-side handling</text>
  <text x="335" y="474" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Parallel to others</text>
  <rect x="610" y="400" width="260" height="160" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="740" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Strategy 3: API-Level</text>
  <text x="625" y="442" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">clear_thinking (1h idle)</text>
  <text x="625" y="458" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">clear_tool_uses (180K)</text>
  <text x="625" y="474" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Target: 40K tokens</text>
  <rect x="30" y="600" width="290" height="180" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="175" y="620" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Strategy 4: Full</text>
  <text x="45" y="642" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">stripImages -&gt; normalize</text>
  <text x="45" y="658" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">-&gt; forkedAgent</text>
  <text x="45" y="674" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">9-section summary</text>
  <text x="45" y="690" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Post-compact skill inject</text>
  <text x="45" y="706" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">POST_COMPACT_MAX = 5</text>
  <rect x="340" y="600" width="260" height="180" rx="12" fill="#FEFCE8" stroke="#EAB308" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="470" y="620" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Strategy 5: Partial</text>
  <text x="355" y="642" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Recent-only summ.</text>
  <text x="355" y="658" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Fallback for edge</text>
  <text x="355" y="674" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">cases</text>
  <rect x="620" y="600" width="250" height="180" rx="12" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="745" y="620" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Strategy 6: Session</text>
  <text x="635" y="642" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">minTokens: 10K</text>
  <text x="635" y="658" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">maxTokens: 40K</text>
  <text x="635" y="674" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">minTextBlock: 5</text>
  <text x="30" y="840" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#F97316">Escalation Flow</text>
  <rect x="30" y="880" width="140" height="80" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="45" y="900" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">S1 Time</text>
  <line x1="170" y1="920" x2="220" y2="920" stroke="#10B981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <rect x="220" y="880" width="140" height="80" rx="12" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="235" y="900" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">S2 Cached</text>
  <line x1="360" y1="920" x2="410" y2="920" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowhead-cyan)"/>
  <rect x="410" y="880" width="140" height="80" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="425" y="900" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">S3 API</text>
  <line x1="550" y1="920" x2="600" y2="920" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowhead-purple)"/>
  <rect x="600" y="880" width="160" height="80" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="615" y="900" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">S4 Full Summary</text>
  <line x1="760" y1="920" x2="810" y2="920" stroke="#F97316" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  <rect x="810" y="880" width="140" height="80" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="825" y="900" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Success</text>
  <line x1="680" y1="960" x2="680" y2="1040" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead-arrow)"/>
  <rect x="620" y="1040" width="120" height="60" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="635" y="1060" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Failure</text>
  <line x1="680" y1="1100" x2="680" y2="1140" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead-arrow)"/>
  <rect x="620" y="1140" width="120" height="60" rx="12" fill="#FEFCE8" stroke="#EAB308" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="635" y="1160" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">S5 Partial</text>
  <rect x="800" y="1040" width="180" height="100" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="890" y="1060" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Safety Net</text>
  <text x="815" y="1082" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">3 failures -&gt;</text>
  <text x="815" y="1098" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">CIRCUIT BREAK</text>
  <text x="815" y="1114" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">(manual re-enable)</text>
</svg>
