<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" width="1400" height="620"><defs><filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1" /></filter><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#94A3B8" /></marker></defs><rect width="100%" height="100%" fill="#ffffff" /><text x="700" y="40" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="#1a1a2e" text-anchor="middle">Swarm Orchestration Architecture</text><text x="700" y="80" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3B82F6" text-anchor="middle">Leader-Follower IPC</text><rect x="80" y="120" width="200" height="100" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" rx="10" filter="url(#dropshadow)" /><text x="180.0" y="140" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#3B82F6" text-anchor="middle">Leader Process</text><text x="180.0" y="162" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">Task creation</text><text x="180.0" y="178" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">Result aggregation</text><text x="180.0" y="194" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">PID: parent</text><line x1="280" y1="170" x2="380" y2="170" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)" /><rect x="380" y="120" width="200" height="100" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2" rx="10" filter="url(#dropshadow)" /><text x="480.0" y="140" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#9CA3AF" text-anchor="middle">File Mailbox</text><text x="480.0" y="162" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">~/claude-code/work/ipc/</text><text x="480.0" y="178" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">500ms polling</text><text x="480.0" y="194" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">Atomic writes</text><line x1="580" y1="170" x2="680" y2="170" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)" /><rect x="700" y="120" width="180" height="100" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" rx="10" filter="url(#dropshadow)" /><text x="790.0" y="140" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Follower</text><text x="790.0" y="162" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">tmux</text><rect x="920" y="120" width="180" height="100" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" rx="10" filter="url(#dropshadow)" /><text x="1010.0" y="140" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Follower</text><text x="1010.0" y="162" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">iTerm2</text><rect x="1140" y="120" width="180" height="100" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" rx="10" filter="url(#dropshadow)" /><text x="1230.0" y="140" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Follower</text><text x="1230.0" y="162" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">In-process</text><text x="700" y="260" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#10B981" text-anchor="middle">Task Assignment Flow</text><rect x="100" y="300" width="220" height="80" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="8" filter="url(#dropshadow)" /><text x="210.0" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">1. Create Task</text><text x="210.0" y="342" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">JSON: {id, cmd}</text><line x1="320" y1="340" x2="340" y2="340" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)" /><rect x="340" y="300" width="220" height="80" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="8" filter="url(#dropshadow)" /><text x="450.0" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">2. Write Mailbox</text><text x="450.0" y="342" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">Atomic + fsync</text><line x1="560" y1="340" x2="580" y2="340" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)" /><rect x="580" y="300" width="220" height="80" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="8" filter="url(#dropshadow)" /><text x="690.0" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">3. Follower Polls</text><text x="690.0" y="342" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">500ms interval</text><line x1="800" y1="340" x2="820" y2="340" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)" /><rect x="820" y="300" width="220" height="80" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="8" filter="url(#dropshadow)" /><text x="930.0" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">4. Execute</text><text x="930.0" y="342" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">tmux send-keys</text><line x1="1040" y1="340" x2="1060" y2="340" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead)" /><rect x="1060" y="300" width="220" height="80" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="8" filter="url(#dropshadow)" /><text x="1170.0" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">5. Write Result</text><text x="1170.0" y="342" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">status, stdout, exit</text><text x="700" y="420" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#06B6D4" text-anchor="middle">Advanced Features</text><rect x="80" y="460" width="320" height="120" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" rx="10" filter="url(#dropshadow)" /><text x="240.0" y="480" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#06B6D4" text-anchor="middle">Session Teleportation</text><text x="240.0" y="502" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">/v1/sessions endpoint</text><text x="240.0" y="518" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">Git bundle: full, HEAD-only, squashed</text><text x="240.0" y="534" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">base64 + gzip transfer</text><rect x="540" y="460" width="320" height="120" fill="#FEFCE8" stroke="#EAB308" stroke-width="2" rx="10" filter="url(#dropshadow)" /><text x="700.0" y="480" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#EAB308" text-anchor="middle">Permission Bridge</text><text x="700.0" y="502" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">Path 1: UI Bridge (primary)</text><text x="700.0" y="518" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">Path 2: Mailbox fallback</text><text x="700.0" y="534" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">30s timeout</text><rect x="1000" y="460" width="320" height="120" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" rx="10" filter="url(#dropshadow)" /><text x="1160.0" y="480" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#EF4444" text-anchor="middle">Race Conditions</text><text x="1160.0" y="502" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">RC-1: Write collision -&gt; flock</text><text x="1160.0" y="518" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">RC-2: Duplicate pickup</text><text x="1160.0" y="534" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="normal" fill="#666666" text-anchor="middle">Verify PID, rate limit 1/5s</text></svg>