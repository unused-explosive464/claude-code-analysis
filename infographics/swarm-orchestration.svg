<svg viewBox="0 0 2000 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    

    <!-- Arrow markers -->
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#4db8ff"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff8844"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="2000" height="1200" class="bg" style="fill: #0a0e17;"/>

  <!-- Title -->
  <text x="1000" y="40" class="text-title" style="font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; fill: #4db8ff;" text-anchor="middle">Claude Code v2.1.88 — Swarm Orchestration Architecture</text>

  <!-- SECTION 1: Leader-Follower Architecture -->
  <text x="30" y="90" class="text-heading" style="font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #66d9ff;">LEADER-FOLLOWER IPC (500ms polling)</text>

  <!-- Leader -->
  <rect x="40" y="120" width="280" height="180" class="box-primary" style="fill: #1a3a52; stroke: #4db8ff; stroke-width: 2;" rx="8"/>
  <text x="180" y="150" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">LEADER PROCESS</text>
  <text x="60" y="180" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Task creation</text>
  <text x="60" y="200" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Assignment logic</text>
  <text x="60" y="220" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Result aggregation</text>
  <text x="60" y="240" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- AsyncLocalStorage</text>
  <text x="60" y="260" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Thread-local context</text>
  <text x="60" y="280" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- PID: parent (locked)</text>

  <!-- Mailbox IPC -->
  <rect x="360" y="120" width="280" height="180" class="box-secondary" style="fill: #1a2a3a; stroke: #66d9ff; stroke-width: 1.5;" rx="8"/>
  <text x="500" y="150" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">FILE-BASED MAILBOX</text>
  <text x="380" y="180" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">~/claude-code/work/ipc/</text>
  <text x="380" y="200" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Polling: 500ms interval</text>
  <text x="380" y="220" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- JSON task messages</text>
  <text x="380" y="240" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Atomic writes (lock)</text>
  <text x="380" y="260" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Cross-process visibility</text>
  <text x="380" y="280" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Fallback: mailbox poll</text>

  <!-- Followers -->
  <rect x="680" y="80" width="260" height="90" class="box-primary" style="fill: #1a3a52; stroke: #4db8ff; stroke-width: 2;" rx="8"/>
  <text x="810" y="110" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">FOLLOWER (tmux)</text>
  <text x="700" y="140" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Terminal multiplexer backend</text>
  <text x="700" y="160" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Session: tmux new-session</text>

  <rect x="680" y="200" width="260" height="90" class="box-primary" style="fill: #1a3a52; stroke: #4db8ff; stroke-width: 2;" rx="8"/>
  <text x="810" y="230" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">FOLLOWER (iTerm2)</text>
  <text x="700" y="260" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">macOS native backend</text>
  <text x="700" y="280" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">AppleScript automation</text>

  <rect x="680" y="320" width="260" height="90" class="box-primary" style="fill: #1a3a52; stroke: #4db8ff; stroke-width: 2;" rx="8"/>
  <text x="810" y="350" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">FOLLOWER (in-process)</text>
  <text x="700" y="380" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Node.js synchronous</text>
  <text x="700" y="400" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Same thread execution</text>

  <!-- Flow arrows -->
  <path d="M 320 210 L 360 210" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>
  <path d="M 640 210 L 680 125" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>
  <path d="M 640 210 L 680 245" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>
  <path d="M 640 210 L 680 365" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>

  <!-- SECTION 2: Task Flow -->
  <text x="30" y="480" class="text-heading" style="font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #66d9ff;">TASK ASSIGNMENT FLOW</text>

  <rect x="40" y="510" width="220" height="70" class="box-good" style="fill: #1a3a2a; stroke: #44ff88; stroke-width: 1.5;" rx="6"/>
  <text x="150" y="535" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">1. Leader Creates Task</text>
  <text x="60" y="560" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">JSON: {id, cmd, args}</text>

  <path d="M 260 545 L 320 545" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>

  <rect x="320" y="510" width="220" height="70" class="box-good" style="fill: #1a3a2a; stroke: #44ff88; stroke-width: 1.5;" rx="6"/>
  <text x="430" y="535" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">2. Write to Follower Mailbox</text>
  <text x="340" y="560" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Atomic write + fsync</text>

  <path d="M 540 545 L 600 545" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>

  <rect x="600" y="510" width="220" height="70" class="box-good" style="fill: #1a3a2a; stroke: #44ff88; stroke-width: 1.5;" rx="6"/>
  <text x="710" y="535" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">3. Follower Polls (500ms)</text>
  <text x="620" y="560" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">inotify / stat check</text>

  <path d="M 820 545 L 880 545" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>

  <rect x="880" y="510" width="220" height="70" class="box-good" style="fill: #1a3a2a; stroke: #44ff88; stroke-width: 1.5;" rx="6"/>
  <text x="990" y="535" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">4. Follower Executes</text>
  <text x="900" y="560" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">tmux send-keys / sh</text>

  <path d="M 1100 545 L 1160 545" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>

  <rect x="1160" y="510" width="220" height="70" class="box-good" style="fill: #1a3a2a; stroke: #44ff88; stroke-width: 1.5;" rx="6"/>
  <text x="1270" y="535" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">5. Write Result Back</text>
  <text x="1180" y="560" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">status, stdout, exit</text>

  <!-- SECTION 3: Coordinator Mode -->
  <text x="30" y="640" class="text-heading" style="font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #66d9ff;">COORDINATOR MODE (Centralized)</text>

  <rect x="40" y="670" width="300" height="120" class="box-primary" style="fill: #1a3a52; stroke: #4db8ff; stroke-width: 2;" rx="8"/>
  <text x="190" y="695" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">Central Coordinator</text>
  <text x="60" y="720" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Route all tasks through one process</text>
  <text x="60" y="740" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- XML task-notification messages</text>
  <text x="60" y="760" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Distributed task scheduling</text>
  <text x="60" y="780" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Coordinates 3 backends</text>

  <path d="M 340 730 L 400 730" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arroworange)"/>

  <rect x="400" y="670" width="280" height="120" class="box-secondary" style="fill: #1a2a3a; stroke: #66d9ff; stroke-width: 1.5;" rx="8"/>
  <text x="540" y="695" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">XML Message Format</text>
  <text x="420" y="720" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">&lt;task id="x"&gt;</text>
  <text x="420" y="740" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">  &lt;cmd&gt;shell_cmd&lt;/cmd&gt;</text>
  <text x="420" y="760" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">  &lt;notify path="..."&gt;</text>
  <text x="420" y="780" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">&lt;/task&gt;</text>

  <!-- SECTION 4: Session Teleportation -->
  <text x="1000" y="640" class="text-heading" style="font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #66d9ff;">SESSION TELEPORTATION (/v1/sessions)</text>

  <rect x="1010" y="670" width="280" height="120" class="box-secondary" style="fill: #1a2a3a; stroke: #66d9ff; stroke-width: 1.5;" rx="8"/>
  <text x="1150" y="695" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">Git Bundle Strategy</text>
  <text x="1030" y="720" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">1. Full history (default)</text>
  <text x="1030" y="740" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">2. HEAD only (→ fastest)</text>
  <text x="1030" y="760" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">3. Squashed fallback</text>
  <text x="1030" y="780" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Transfer: base64 + gzip</text>

  <path d="M 1290 730 L 1350 730" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arroworange)"/>

  <rect x="1350" y="670" width="280" height="120" class="box-primary" style="fill: #1a3a52; stroke: #4db8ff; stroke-width: 2;" rx="8"/>
  <text x="1490" y="695" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">Remote Session Created</text>
  <text x="1370" y="720" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- New /sessions/{id}</text>
  <text x="1370" y="740" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Git history restored</text>
  <text x="1370" y="760" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- AsyncLocalStorage synced</text>
  <text x="1370" y="780" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Ready for execution</text>

  <!-- SECTION 5: Permission Bridge -->
  <text x="30" y="860" class="text-heading" style="font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #66d9ff;">PERMISSION BRIDGE (Dual-Path Resolution)</text>

  <rect x="40" y="890" width="300" height="140" class="box-primary" style="fill: #1a3a52; stroke: #4db8ff; stroke-width: 2;" rx="8"/>
  <text x="190" y="915" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">Path 1: UI Bridge (Primary)</text>
  <text x="60" y="945" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Permission request → UI overlay</text>
  <text x="60" y="965" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- User grants in browser</text>
  <text x="60" y="985" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Token → AsyncLocalStorage</text>
  <text x="60" y="1005" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Fast path (if in UI)</text>

  <path d="M 340 960 L 400 960" class="line-flow" style="stroke: #4db8ff; stroke-width: 2; fill: none;" marker-end="url(#arrowblue)"/>

  <rect x="400" y="890" width="300" height="140" class="box-secondary" style="fill: #1a2a3a; stroke: #66d9ff; stroke-width: 1.5;" rx="8"/>
  <text x="550" y="915" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">Path 2: Mailbox Fallback</text>
  <text x="420" y="945" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Write permission req to mailbox</text>
  <text x="420" y="965" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Poll for approval</text>
  <text x="420" y="985" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Timeout: 30s (retry 3x)</text>
  <text x="420" y="1005" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">- Slower but cross-process</text>

  <!-- SECTION 6: Vulnerabilities -->
  <text x="770" y="860" class="text-heading" style="font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #66d9ff;">RACE CONDITIONS (5 Identified)</text>

  <rect x="770" y="890" width="340" height="140" class="box-warning" style="fill: #3a2a1a; stroke: #ff8844; stroke-width: 2;" rx="8"/>
  <text x="940" y="915" class="text-label" style="font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff;" text-anchor="middle">RC-1: Mailbox Write Collision</text>
  <text x="790" y="945" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Multiple leaders write same task ID</text>
  <text x="790" y="965" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Mitigation: flock + atomic rename</text>
  <text x="790" y="985" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">Duplicate Task Pickup (RC-2):</text>
  <text x="790" y="1005" class="text-small" style="font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc;">2 followers read same task before mark</text>

  <!-- CRITICAL VULNERABILITY -->
  <rect x="1150" y="890" width="400" height="230" class="box-critical" style="fill: #3a1a1a; stroke: #ff4444; stroke-width: 2;" rx="8"/>
  <text x="1350" y="915" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;" text-anchor="middle">CRITICAL: Permission Bridge Hijack</text>
  <text x="1170" y="950" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">Vector: Malicious task writes fake</text>
  <text x="1170" y="970" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">permission request to mailbox → UI</text>
  <text x="1170" y="990" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">modal appears → user clicks "allow"</text>
  <text x="1170" y="1010" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">Attacker gains read/write capability</text>
  <text x="1170" y="1040" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">Mitigation Plan:</text>
  <text x="1170" y="1060" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">- UI modal: show requesting PROCESS ID</text>
  <text x="1170" y="1080" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">- Verify async_id matches leader PID</text>
  <text x="1170" y="1100" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">- Rate limit: max 1 perm req/5s</text>
  <text x="1170" y="1120" class="text-critical" style="font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ff4444;">- Log all permissions to audit trail</text>

</svg>
