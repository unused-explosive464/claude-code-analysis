<?xml version="1.0" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1050" width="1500px" height="1050px" style="background-color: #ffffff">
  <defs>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset in="SourceGraphic" dx="0" dy="2"/>
      <feGaussianBlur in="offsetblur" stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94A3B8"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#EF4444"/>
    </marker>
  </defs>

  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#06B6D4">Permission Engine &amp; YOLO Classifier</text>

  <!-- ========== LEFT COLUMN: Entry + Mode Selection ========== -->
  <text x="40" y="100" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#06B6D4">Entry Point</text>
  <rect x="30" y="120" width="380" height="90" rx="12" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="220" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Tool Use Request</text>
  <text x="45" y="167" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">{ toolName, parameters, context }</text>

  <line x1="220" y1="210" x2="220" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead-arrow)"/>

  <text x="40" y="275" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#8B5CF6">Mode Selection</text>
  <polygon points="150,295 195,340 150,385 105,340" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="150" y="344" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Mode?</text>

  <!-- Mode boxes -->
  <rect x="40" y="410" width="80" height="40" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="80" y="435" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">default</text>
  <rect x="130" y="410" width="80" height="40" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="170" y="435" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">plan</text>
  <rect x="220" y="410" width="80" height="40" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="260" y="435" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">acceptEdits</text>
  <rect x="310" y="410" width="80" height="40" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="350" y="435" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">auto</text>

  <!-- Feature Gates -->
  <rect x="40" y="470" width="370" height="90" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="225" y="495" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Feature Gates</text>
  <text x="55" y="517" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">tengu_disable_bypass</text>
  <text x="55" y="535" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">killswitch, iron_gate, circuitBreaker</text>

  <!-- Mode -> Rule Evaluation arrow -->
  <line x1="195" y1="340" x2="430" y2="340" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-arrow)"/>

  <!-- ========== MIDDLE COLUMN: Rule Evaluation ========== -->
  <text x="450" y="275" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#F97316">Rule Evaluation</text>
  <rect x="430" y="295" width="300" height="70" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="580" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Load Rules Cascade</text>
  <text x="445" y="345" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">project -&gt; global -&gt; managed</text>

  <line x1="580" y1="365" x2="580" y2="385" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead-arrow)"/>

  <rect x="430" y="385" width="300" height="80" rx="12" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="580" y="410" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Rule Format</text>
  <text x="445" y="432" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">ToolName(ruleContent)</text>
  <text x="445" y="450" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Types: allow | deny | ask</text>

  <line x1="580" y1="465" x2="580" y2="490" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead-arrow)"/>

  <!-- Match? diamond -->
  <polygon points="580,490 625,535 580,580 535,535" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="580" y="540" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Match?</text>

  <!-- Match Yes -> Apply Rule -->
  <line x1="580" y1="580" x2="580" y2="620" stroke="#10B981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="595" y="605" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#10B981">Yes</text>
  <rect x="520" y="620" width="120" height="50" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="580" y="650" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Apply Rule</text>

  <!-- Match No -> YOLO arrow -->
  <line x1="625" y1="535" x2="770" y2="535" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-arrow)"/>
  <text x="700" y="525" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666666" text-anchor="middle">No match</text>

  <!-- ========== RIGHT COLUMN: YOLO Classifier ========== -->
  <text x="800" y="275" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3B82F6">YOLO Classifier</text>

  <rect x="770" y="295" width="280" height="100" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="910" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Stage 1: Fast Path</text>
  <text x="785" y="342" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">max_tokens = 64</text>
  <text x="785" y="360" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">stop_sequences = ['&lt;/block&gt;']</text>
  <text x="785" y="378" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Temperature = 0</text>

  <line x1="910" y1="395" x2="910" y2="430" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead-arrow)"/>

  <!-- Contains? diamond -->
  <polygon points="910,430 955,475 910,520 865,475" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="910" y="479" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Contains?</text>

  <!-- Contains Yes -> ALLOW -->
  <line x1="955" y1="475" x2="1070" y2="475" stroke="#10B981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="1010" y="465" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">Yes</text>
  <rect x="1070" y="450" width="100" height="50" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1120" y="480" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10B981">ALLOW</text>

  <!-- Contains No -> Stage 2 -->
  <line x1="910" y1="520" x2="910" y2="560" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead-arrow)"/>
  <text x="925" y="545" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666666">No</text>

  <rect x="770" y="560" width="280" height="120" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="910" y="585" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Stage 2: Reasoning</text>
  <text x="785" y="607" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">max_tokens = 4,096</text>
  <text x="785" y="625" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Parse &lt;decision&gt; tag</text>
  <text x="785" y="643" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Cache: 1h TTL</text>
  <text x="785" y="661" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">60-80% hit rate</text>

  <!-- ========== FAR RIGHT: Decision Paths (clear of YOLO) ========== -->
  <text x="1210" y="275" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#8B5CF6">Decision Paths</text>
  <rect x="1200" y="295" width="270" height="45" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1335" y="323" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Path 1: ALLOW</text>
  <rect x="1200" y="350" width="270" height="45" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1335" y="378" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Path 2: DENY</text>
  <rect x="1200" y="405" width="270" height="45" rx="10" fill="#FEFCE8" stroke="#EAB308" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1335" y="433" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Path 3: ASK</text>
  <rect x="1200" y="460" width="270" height="45" rx="10" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1335" y="488" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Path 4: Auto Mode</text>
  <rect x="1200" y="515" width="270" height="45" rx="10" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1335" y="543" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Path 5: Other Modes</text>
  <rect x="1200" y="570" width="270" height="45" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1335" y="598" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Path 6: Circuit Break</text>

  <!-- YOLO -> Decision Paths arrow -->
  <line x1="1050" y1="340" x2="1200" y2="340" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-arrow)"/>

  <!-- ========== BOTTOM: Output ========== -->
  <line x1="580" y1="670" x2="580" y2="740" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-arrow)"/>
  <text x="40" y="770" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#06B6D4">Output</text>
  <rect x="30" y="790" width="550" height="80" rx="12" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="305" y="815" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">PermissionResult</text>
  <text x="45" y="840" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">decision + reason + metadata</text>

  <rect x="620" y="790" width="280" height="80" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="760" y="815" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Telemetry</text>
  <text x="635" y="840" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">events, token usage, latency</text>
</svg>
