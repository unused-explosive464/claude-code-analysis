<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .text-primary { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
      .text-code { fill: #e6edf3; font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace; font-size: 11px; }
      .text-title { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 600; }
      .text-decision { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; }
      .text-small { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 10px; }
      .box { fill: #1c2128; stroke: #30363d; stroke-width: 1; }
      .box-process { fill: #0969da; stroke: #0969da; stroke-width: 1; }
      .diamond { fill: #f0883e; stroke: #f0883e; stroke-width: 1; }
      .box-compact { fill: #238636; stroke: #238636; stroke-width: 1; }
      .line { stroke: #30363d; stroke-width: 1.5; fill: none; }
      .arrow { stroke: #58a6ff; stroke-width: 1.5; fill: none; }
      .arrow-head { fill: #58a6ff; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 10 3, 0 6" class="arrow-head"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="600"/>

  <!-- Title -->
  <text x="450" y="22" class="text-title" text-anchor="middle">Agent Loop Flowchart</text>

  <!-- START -->
  <rect x="380" y="40" width="140" height="40" class="box-process" rx="4"/>
  <text x="450" y="65" class="text-primary" text-anchor="middle">Start: User Input</text>

  <!-- Arrow down -->
  <path d="M 450 80 L 450 110" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Context Pressure Check -->
  <polygon points="450,110 530,160 450,210 370,160" class="diamond"/>
  <text x="450" y="160" class="text-decision" text-anchor="middle">Context</text>
  <text x="450" y="175" class="text-decision" text-anchor="middle">Pressure</text>
  <text x="450" y="190" class="text-decision" text-anchor="middle">> 0.93?</text>

  <!-- YES path to Compact -->
  <path d="M 370 160 L 280 160" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="310" y="155" class="text-primary" font-size="10">YES</text>

  <rect x="160" y="130" width="120" height="60" class="box-compact" rx="3"/>
  <text x="220" y="155" class="text-primary" text-anchor="middle">Compaction</text>
  <text x="220" y="170" class="text-code" text-anchor="middle">(3 Tiers)</text>

  <!-- Loop back from compact -->
  <path d="M 220 190 L 220 280 L 450 280 L 450 210" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="2,2"/>

  <!-- NO path to Stream -->
  <path d="M 450 210 L 450 240" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="465" y="230" class="text-primary" font-size="10">NO</text>

  <!-- Stream Model Call -->
  <rect x="350" y="240" width="200" height="50" class="box-process" rx="3"/>
  <text x="450" y="260" class="text-primary" text-anchor="middle">Stream Model Call</text>
  <text x="450" y="276" class="text-code" text-anchor="middle">(yields events to UI)</text>

  <!-- Arrow down -->
  <path d="M 450 290 L 450 320" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Tool Use Check -->
  <polygon points="450,320 530,370 450,420 370,370" class="diamond"/>
  <text x="450" y="375" class="text-decision" text-anchor="middle">Tool Use</text>
  <text x="450" y="390" class="text-decision" text-anchor="middle">Detected?</text>

  <!-- YES path to Executor -->
  <path d="M 530 370 L 610 370" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="560" y="365" class="text-primary" font-size="10">YES</text>

  <rect x="610" y="340" width="150" height="60" class="box-process" rx="3"/>
  <text x="685" y="360" class="text-primary" text-anchor="middle">StreamingToolExecutor</text>
  <text x="685" y="375" class="text-code" text-anchor="middle">(concurrent/exclusive)</text>

  <!-- Executor back to termination check -->
  <path d="M 685 400 L 685 450 L 450 450 L 450 420" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- NO path to Termination -->
  <path d="M 450 420 L 450 480" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="465" y="450" class="text-primary" font-size="10">NO</text>

  <!-- Termination Check -->
  <polygon points="450,480 530,530 450,580 370,530" class="diamond"/>
  <text x="450" y="525" class="text-decision" text-anchor="middle">Should Stop?</text>
  <text x="450" y="540" class="text-small" text-anchor="middle">(completed/aborted/</text>
  <text x="450" y="550" class="text-small" text-anchor="middle">max_turns/exhausted)</text>

  <!-- YES path to END -->
  <path d="M 530 530 L 760 530" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="640" y="525" class="text-primary" font-size="10">YES</text>

  <rect x="760" y="500" width="100" height="60" class="box-process" rx="4"/>
  <text x="810" y="533" class="text-primary" text-anchor="middle">End</text>

  <!-- NO path - Continue Loop -->
  <path d="M 370 530 L 280 530" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="310" y="525" class="text-primary" font-size="10">NO</text>

  <!-- Continue options box -->
  <rect x="80" y="500" width="200" height="60" class="box" rx="3"/>
  <text x="180" y="515" class="text-code" text-anchor="middle">next_turn</text>
  <text x="180" y="530" class="text-code" text-anchor="middle">collapse_drain_retry</text>
  <text x="180" y="545" class="text-code" text-anchor="middle">reactive_compact_retry</text>

  <!-- Loop back -->
  <path d="M 180 500 L 180 100 L 370 160" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="2,2"/>
  <text x="150" y="300" class="text-small">escalation</text>
  <text x="150" y="315" class="text-small">recovery</text>
</svg>