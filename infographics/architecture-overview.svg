<svg width="1500" height="1400" viewBox="0 0 1500 1400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#EF4444"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="750" y="40" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="#1a1a2e" text-anchor="middle">Claude Code v2.1.88 - Architecture Flow</text>
  <text x="750" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#666666" text-anchor="middle">1,902 TypeScript files | 423K LOC | End-to-end request lifecycle</text>

  <!-- ==================== ENTRY POINTS (top) ==================== -->
  <rect x="200" y="90" width="140" height="50" rx="10" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="270" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">CLI</text>

  <rect x="370" y="90" width="140" height="50" rx="10" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">SDK</text>

  <rect x="540" y="90" width="140" height="50" rx="10" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="610" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">MCP Server</text>

  <!-- Entry arrows converge -->
  <line x1="270" y1="140" x2="440" y2="180" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="440" y1="140" x2="440" y2="180" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="610" y1="140" x2="440" y2="180" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ==================== BOOTSTRAP ==================== -->
  <rect x="310" y="180" width="260" height="60" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="205" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Bootstrap (10 steps)</text>
  <text x="440" y="225" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Auth, Config, Plugins, MCP, Permissions, UI</text>

  <line x1="440" y1="240" x2="440" y2="280" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ==================== REPL LOOP (the core cycle) ==================== -->
  <!-- Big rounded rect to frame the loop -->
  <rect x="80" y="280" width="880" height="1050" rx="20" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="8,4" opacity="0.3"/>
  <text x="100" y="310" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#3B82F6" opacity="0.5">AGENT LOOP</text>

  <!-- User Input -->
  <rect x="340" y="330" width="200" height="50" rx="10" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">User Message</text>

  <line x1="440" y1="380" x2="440" y2="420" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- System Prompt Assembly -->
  <rect x="280" y="420" width="320" height="70" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="445" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">System Prompt Assembly</text>
  <text x="440" y="465" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Static (30-40K cached) + Dynamic (per-session)</text>
  <text x="440" y="480" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Tools, History, CLAUDE.md, Env Info</text>

  <!-- Memory feeds into prompt -->
  <rect x="100" y="390" width="150" height="70" rx="10" fill="#FEFCE8" stroke="#EAB308" stroke-width="2" filter="url(#shadow)"/>
  <text x="175" y="415" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Memory</text>
  <text x="175" y="433" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666666">CLAUDE.md</text>
  <text x="175" y="448" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666666">Memdir (5 topics)</text>
  <line x1="250" y1="430" x2="280" y2="450" stroke="#EAB308" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <line x1="440" y1="490" x2="440" y2="530" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API Client + Provider -->
  <rect x="300" y="530" width="280" height="70" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="555" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">API Client</text>
  <text x="440" y="575" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Provider routing: 1P / Bedrock / Vertex / Foundry</text>
  <text x="440" y="590" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Retry (6x), cache, token counting</text>

  <!-- Arrow to Claude API (external) -->
  <line x1="580" y1="565" x2="680" y2="565" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <rect x="680" y="535" width="200" height="60" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="780" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#8B5CF6">Claude API</text>
  <text x="780" y="580" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">SSE stream response</text>

  <!-- Stream back -->
  <line x1="780" y1="595" x2="780" y2="650" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Response Stream -->
  <rect x="660" y="650" width="240" height="50" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="680" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Response Stream Parser</text>

  <!-- Fork: Text vs Tool Use -->
  <!-- Text path (right) -->
  <line x1="900" y1="675" x2="1010" y2="675" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="955" y="665" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">text</text>

  <rect x="1010" y="640" width="200" height="70" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <text x="1110" y="665" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Ink Renderer</text>
  <text x="1110" y="683" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">React + Yoga → Terminal</text>
  <text x="1110" y="699" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Frame diff: 10KB → 50B</text>

  <!-- Tool Use path (down) -->
  <line x1="780" y1="700" x2="780" y2="750" stroke="#F97316" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="800" y="730" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#F97316">tool_use</text>

  <!-- ==================== PERMISSION CHECK ==================== -->
  <rect x="640" y="750" width="280" height="80" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="775" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Permission Engine</text>
  <text x="780" y="795" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Rules cascade → YOLO Classifier (2-stage)</text>
  <text x="780" y="811" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">6 modes: default, plan, auto, acceptEdits...</text>

  <!-- Permission decision diamond -->
  <line x1="780" y1="830" x2="780" y2="860" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="780,860 820,900 780,940 740,900" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="904" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#F97316">Allow?</text>

  <!-- DENY path -->
  <line x1="740" y1="900" x2="620" y2="900" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="680" y="890" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#EF4444" text-anchor="middle">deny/ask</text>
  <rect x="490" y="878" width="130" height="44" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="555" y="905" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#EF4444">Block / Prompt</text>

  <!-- ALLOW path -->
  <line x1="820" y1="900" x2="920" y2="900" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="870" y="890" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">allow</text>

  <!-- ==================== TOOL EXECUTION ==================== -->
  <rect x="920" y="870" width="280" height="70" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="1060" y="895" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">StreamingToolExecutor</text>
  <text x="1060" y="915" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Safe (Read, Glob) → parallel | Unsafe (Bash, Edit) → queue</text>
  <text x="1060" y="930" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">AbortController per tool, result yielded</text>

  <!-- Tool result arrow back up to loop -->
  <line x1="1060" y1="940" x2="1060" y2="990" stroke="#F97316" stroke-width="2"/>
  <line x1="1060" y1="990" x2="440" y2="990" stroke="#F97316" stroke-width="2"/>
  <line x1="440" y1="990" x2="440" y2="1040" stroke="#F97316" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- ==================== CONTEXT CHECK ==================== -->
  <polygon points="440,1040 490,1085 440,1130 390,1085" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="1082" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="#F97316">Context</text>
  <text x="440" y="1097" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666666">full?</text>

  <!-- Under limit -> back to top of loop -->
  <line x1="390" y1="1085" x2="200" y2="1085" stroke="#10B981" stroke-width="2"/>
  <text x="295" y="1075" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">under limit</text>
  <line x1="200" y1="1085" x2="200" y2="360" stroke="#10B981" stroke-width="2"/>
  <line x1="200" y1="360" x2="340" y2="360" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Over limit -> Compaction -->
  <line x1="490" y1="1085" x2="600" y2="1085" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="545" y="1075" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#EF4444" text-anchor="middle">over limit</text>

  <rect x="600" y="1050" width="300" height="80" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="1075" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Compaction Engine</text>
  <text x="750" y="1095" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Tier 1: Microcompact (free) → Tier 2: Full (forked agent)</text>
  <text x="750" y="1112" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Tier 3: Session memory → 9-section summary</text>

  <!-- Compaction back to loop -->
  <line x1="750" y1="1130" x2="750" y2="1160" stroke="#94A3B8" stroke-width="2"/>
  <line x1="750" y1="1160" x2="160" y2="1160" stroke="#94A3B8" stroke-width="2"/>
  <line x1="160" y1="1160" x2="160" y2="360" stroke="#94A3B8" stroke-width="2"/>
  <line x1="160" y1="360" x2="340" y2="360" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ==================== RIGHT SIDE PANELS ==================== -->

  <!-- Plugin System -->
  <rect x="1050" y="380" width="220" height="100" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="1160" y="405" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#F97316">Plugin System</text>
  <text x="1160" y="425" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">20,521 LOC | 44 files</text>
  <text x="1160" y="443" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">MCP servers, hooks,</text>
  <text x="1160" y="459" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">marketplace, 5 scopes</text>
  <line x1="1050" y1="450" x2="600" y2="450" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- Swarm / Agents -->
  <rect x="1050" y="130" width="220" height="100" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1160" y="155" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#8B5CF6">Agent Orchestration</text>
  <text x="1160" y="175" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Swarm: leader-follower IPC</text>
  <text x="1160" y="193" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Coordinator: centralized</text>
  <text x="1160" y="211" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Speculative exec (CoW)</text>

  <!-- Security -->
  <rect x="1300" y="750" width="180" height="110" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <text x="1390" y="775" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Security</text>
  <text x="1390" y="795" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Bash parser</text>
  <text x="1390" y="811" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Secret scanner</text>
  <text x="1390" y="827" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Audit log</text>
  <text x="1390" y="843" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">15 dangerous nodes</text>
  <line x1="1300" y1="800" x2="920" y2="800" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- Slash Commands -->
  <rect x="1300" y="530" width="180" height="80" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1390" y="555" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">150+ Commands</text>
  <text x="1390" y="575" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Skills, /commit, /pr</text>
  <text x="1390" y="593" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">prompt | local | jsx</text>

  <!-- State -->
  <rect x="1300" y="380" width="180" height="80" rx="12" fill="#FEFCE8" stroke="#EAB308" stroke-width="2" filter="url(#shadow)"/>
  <text x="1390" y="405" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#EAB308">AppState</text>
  <text x="1390" y="425" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">565+ reactive props</text>
  <text x="1390" y="443" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Session, history, cache</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="100" y="1220" width="1300" height="130" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="750" y="1250" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Architecture Summary</text>

  <line x1="160" y1="1275" x2="210" y2="1275" stroke="#3B82F6" stroke-width="2"/>
  <text x="220" y="1280" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">Request flow</text>

  <line x1="340" y1="1275" x2="390" y2="1275" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="1280" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">Loop-back / allow</text>

  <line x1="520" y1="1275" x2="570" y2="1275" stroke="#F97316" stroke-width="2"/>
  <text x="580" y="1280" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">Tool execution</text>

  <line x1="700" y1="1275" x2="750" y2="1275" stroke="#EF4444" stroke-width="2"/>
  <text x="760" y="1280" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">Block / compact</text>

  <line x1="880" y1="1275" x2="930" y2="1275" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="940" y="1280" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#333333">Data feed</text>

  <text x="160" y="1310" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Entry: CLI (2,440 LOC) | SDK (380) | MCP (620) | Config (1,850 LOC, 60+ flags)</text>
  <text x="160" y="1330" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">UI: Ink (28.4K LOC) | 389 components | 104 hooks | 220+ keybindings | Terminal raw mode</text>

</svg>
