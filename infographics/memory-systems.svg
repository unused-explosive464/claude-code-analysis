<svg viewBox="0 0 2000 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0a0e17; }
      .text-title { font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; fill: #4db8ff; }
      .text-heading { font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #66d9ff; }
      .text-label { font-family: 'Courier New', monospace; font-size: 14px; fill: #a0d0ff; }
      .text-small { font-family: 'Courier New', monospace; font-size: 12px; fill: #7a9acc; }
      .text-tiny { font-family: 'Courier New', monospace; font-size: 11px; fill: #5a7acc; }
      .box-persistent { fill: #1a3a2a; stroke: #44ff88; stroke-width: 2; }
      .box-session { fill: #1a3a52; stroke: #4db8ff; stroke-width: 2; }
      .box-remote { fill: #3a2a1a; stroke: #ff8844; stroke-width: 2; }
      .box-reactive { fill: #2a1a3a; stroke: #dd66ff; stroke-width: 2; }
      .box-secondary { fill: #1a2a3a; stroke: #66d9ff; stroke-width: 1.5; }
      .line-persist { stroke: #44ff88; stroke-width: 2; fill: none; }
      .line-session { stroke: #4db8ff; stroke-width: 2; fill: none; }
      .line-remote { stroke: #ff8844; stroke-width: 2; fill: none; }
      .line-reactive { stroke: #dd66ff; stroke-width: 2; fill: none; }
      .line-flow { stroke: #66d9ff; stroke-width: 1.5; fill: none; stroke-dasharray: 3,3; }
      .arrow { fill: #66d9ff; }
    </style>

    <!-- Arrow markers -->
    <marker id="arrowsess" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#4db8ff"/>
    </marker>
    <marker id="arrowpers" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#44ff88"/>
    </marker>
    <marker id="arrowrem" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff8844"/>
    </marker>
    <marker id="arrowreact" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#dd66ff"/>
    </marker>
    <marker id="arrowflow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#66d9ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="2000" height="1200" class="bg"/>

  <!-- Title -->
  <text x="1000" y="40" class="text-title" text-anchor="middle">Claude Code v2.1.88 — Memory Systems Architecture</text>

  <!-- Legend -->
  <circle cx="50" cy="65" r="6" class="box-persistent"/>
  <text x="70" y="70" class="text-small">Persistent</text>

  <circle cx="250" cy="65" r="6" class="box-session"/>
  <text x="270" y="70" class="text-small">Session</text>

  <circle cx="450" cy="65" r="6" class="box-remote"/>
  <text x="470" y="70" class="text-small">Remote</text>

  <circle cx="650" cy="65" r="6" class="box-reactive"/>
  <text x="670" y="70" class="text-small">Reactive</text>

  <!-- SECTION 1: Memdir Semantic Memory (Persistent) -->
  <text x="30" y="125" class="text-heading">MEMDIR SEMANTIC MEMORY (Persistent, ~/.claude-code/memory/)</text>

  <rect x="30" y="150" width="420" height="260" class="box-persistent" rx="8"/>
  <text x="240" y="175" class="text-label" text-anchor="middle">Memdir Index + Topic Files</text>

  <text x="50" y="205" class="text-small">File Structure:</text>
  <text x="50" y="225" class="text-tiny">- MEMORY.md: master index</text>
  <text x="50" y="243" class="text-tiny">- topics/{name}.md: semantic store</text>
  <text x="50" y="261" class="text-tiny">- .gitignore: exclude secrets</text>

  <text x="50" y="290" class="text-small">4-Type Taxonomy:</text>
  <text x="50" y="308" class="text-tiny">1. user: preferences, habits</text>
  <text x="50" y="326" class="text-tiny">2. feedback: corrections, edits</text>
  <text x="50" y="344" class="text-tiny">3. project: codebase context</text>
  <text x="50" y="362" class="text-tiny">4. reference: doc links, API</text>

  <text x="50" y="386" class="text-small">Constraints (per query):</text>
  <text x="50" y="404" class="text-tiny">- Max 5 memories selected</text>
  <text x="50" y="422" class="text-tiny">- 200 lines / 25 KB cap each</text>

  <!-- SECTION 2: Team Memory Sync (Remote) -->
  <text x="490" y="125" class="text-heading">TEAM MEMORY SYNC (Remote, Pull-Push)</text>

  <rect x="490" y="150" width="420" height="260" class="box-remote" rx="8"/>
  <text x="700" y="175" class="text-label" text-anchor="middle">Remote Sync Protocol</text>

  <text x="510" y="205" class="text-small">Push Strategy:</text>
  <text x="510" y="225" class="text-tiny">- Compute delta: SHA256 hash</text>
  <text x="510" y="243" class="text-tiny">- ETag caching (git show-ref)</text>
  <text x="510" y="261" class="text-tiny">- Push only changed files</text>

  <text x="510" y="290" class="text-small">Pull Strategy:</text>
  <text x="510" y="308" class="text-tiny">- Fetch from origin/main</text>
  <text x="510" y="326" class="text-tiny">- Merge with optimistic lock</text>
  <text x="510" y="344" class="text-tiny">- Conflict resolution: last-write</text>

  <text x="510" y="368" class="text-small">Security (44 gitleaks rules):</text>
  <text x="510" y="386" class="text-tiny">- API key detection</text>
  <text x="510" y="404" class="text-tiny">- JWT/token patterns</text>

  <!-- SECTION 3: Session Memory Extraction (Session) -->
  <text x="950" y="125" class="text-heading">SESSION MEMORY EXTRACTION (Session-local)</text>

  <rect x="950" y="150" width="420" height="260" class="box-session" rx="8"/>
  <text x="1160" y="175" class="text-label" text-anchor="middle">Durable + Threshold-Based</text>

  <text x="970" y="205" class="text-small">extractMemories() [Durable]:</text>
  <text x="970" y="225" class="text-tiny">- stopHooks trigger on session end</text>
  <text x="970" y="243" class="text-tiny">- Extract insights from transcript</text>
  <text x="970" y="261" class="text-tiny">- Write to memdir atomically</text>

  <text x="970" y="290" class="text-small">SessionMemory [Ephemeral]:</text>
  <text x="970" y="308" class="text-tiny">- Init: 10K tokens capacity</text>
  <text x="970" y="326" class="text-tiny">- Growth: +5K per conversation</text>
  <text x="970" y="344" class="text-tiny">- Tool calls: +3 each</text>

  <text x="970" y="368" class="text-small">Window Strategy:</text>
  <text x="970" y="386" class="text-tiny">- Keep last 50 messages</text>
  <text x="970" y="404" class="text-tiny">- Summarize older history</text>

  <!-- SECTION 4: autoDream Consolidation (Persistent) -->
  <text x="1410" y="125" class="text-heading">autoDream (Persistent Background)</text>

  <rect x="1410" y="150" width="540" height="260" class="box-persistent" rx="8"/>
  <text x="1680" y="175" class="text-label" text-anchor="middle">Scheduled Consolidation</text>

  <text x="1430" y="205" class="text-small">Trigger Conditions:</text>
  <text x="1430" y="225" class="text-tiny">- Every 24 hours (cron: 0 2 * * *)</text>
  <text x="1430" y="243" class="text-tiny">- OR after 5 sessions completed</text>
  <text x="1430" y="261" class="text-tiny">- PID lock file: ~/.claude-code/pids/autoDream.lock</text>

  <text x="1430" y="290" class="text-small">Processing:</text>
  <text x="1430" y="308" class="text-tiny">1. Read SessionMemory from durable store</text>
  <text x="1430" y="326" class="text-tiny">2. Consolidate using Claude Sonnet</text>
  <text x="1430" y="344" class="text-tiny">3. Extract key insights, decisions</text>
  <text x="1430" y="362" class="text-tiny">4. Update MEMORY.md + topic files</text>

  <!-- SECTION 5: AppState (Reactive) -->
  <text x="30" y="480" class="text-heading">AppState (Reactive Store, useSyncExternalStore)</text>

  <rect x="30" y="505" width="420" height="200" class="box-reactive" rx="8"/>
  <text x="240" y="530" class="text-label" text-anchor="middle">565+ Properties</text>

  <text x="50" y="560" class="text-small">Core State Properties:</text>
  <text x="50" y="580" class="text-tiny">- currentSessionId: string</text>
  <text x="50" y="598" class="text-tiny">- uiMode: 'edit' | 'view' | 'focus'</text>
  <text x="50" y="616" class="text-tiny">- commandHistory: Command[]</text>
  <text x="50" y="634" class="text-tiny">- selectedMemories: Memory[]</text>
  <text x="50" y="652" class="text-tiny">- permissionCache: Map&lt;string, Grant&gt;</text>

  <text x="50" y="676" class="text-small">Listeners:</text>
  <text x="50" y="694" class="text-tiny">- React components subscribe</text>

  <!-- SECTION 6: Context Compaction -->
  <text x="490" y="480" class="text-heading">CONTEXT COMPACTION (Memory Preservation)</text>

  <rect x="490" y="505" width="420" height="200" class="box-session" rx="8"/>
  <text x="700" y="530" class="text-label" text-anchor="middle">9-Section Summary Format</text>

  <text x="510" y="560" class="text-small">Compaction Strategy:</text>
  <text x="510" y="580" class="text-tiny">1. Summarize conversation history</text>
  <text x="510" y="598" class="text-tiny">2. Extract key decisions, context</text>
  <text x="510" y="616" class="text-tiny">3. Re-inject skills from skill store</text>
  <text x="510" y="634" class="text-tiny">4. Preserve memory references (!mem)</text>
  <text x="510" y="652" class="text-tiny">5. Keep critical tool definitions</text>

  <text x="510" y="676" class="text-small">Output (injected to next session):</text>
  <text x="510" y="694" class="text-tiny">- Compact 50% of original length</text>

  <!-- SECTION 7: MagicDocs -->
  <text x="950" y="480" class="text-heading">MagicDocs (Auto-Maintained Markdown)</text>

  <rect x="950" y="505" width="420" height="200" class="box-persistent" rx="8"/>
  <text x="1160" y="530" class="text-label" text-anchor="middle">Forked Agent + File Watcher</text>

  <text x="970" y="560" class="text-small">Mechanism:</text>
  <text x="970" y="580" class="text-tiny">- Spawn agent on file open</text>
  <text x="970" y="598" class="text-tiny">- Monitor changes via inotify</text>
  <text x="970" y="616" class="text-tiny">- Update on memory extraction</text>
  <text x="970" y="634" class="text-tiny">- Sync with team memory push</text>

  <text x="970" y="658" class="text-small">Markdown Format:</text>
  <text x="970" y="676" class="text-tiny">- Frontmatter: metadata, tags</text>
  <text x="970" y="694" class="text-tiny">- Sections: insights, decisions</text>

  <!-- SECTION 8: Data Flow Diagram -->
  <text x="30" y="780" class="text-heading">DATA FLOW: Session → Extract → Persist → Sync → Compact</text>

  <!-- Flow boxes -->
  <rect x="30" y="815" width="150" height="80" class="box-session" rx="6"/>
  <text x="105" y="840" class="text-label" text-anchor="middle">SESSION</text>
  <text x="50" y="865" class="text-tiny">Convo history</text>
  <text x="50" y="880" class="text-tiny">Tool outputs</text>

  <path d="M 180 855 L 240 855" class="line-session" marker-end="url(#arrowsess)"/>

  <rect x="240" y="815" width="150" height="80" class="box-persistent" rx="6"/>
  <text x="315" y="840" class="text-label" text-anchor="middle">EXTRACT</text>
  <text x="260" y="865" class="text-tiny">Parse insights</text>
  <text x="260" y="880" class="text-tiny">via Sonnet</text>

  <path d="M 390 855 L 450 855" class="line-persist" marker-end="url(#arrowpers)"/>

  <rect x="450" y="815" width="150" height="80" class="box-persistent" rx="6"/>
  <text x="525" y="840" class="text-label" text-anchor="middle">MEMDIR</text>
  <text x="470" y="865" class="text-tiny">MEMORY.md</text>
  <text x="470" y="880" class="text-tiny">topics/*.md</text>

  <path d="M 600 855 L 660 855" class="line-remote" marker-end="url(#arrowrem)"/>

  <rect x="660" y="815" width="150" height="80" class="box-remote" rx="6"/>
  <text x="735" y="840" class="text-label" text-anchor="middle">TEAM SYNC</text>
  <text x="680" y="865" class="text-tiny">SHA256 delta</text>
  <text x="680" y="880" class="text-tiny">Git push</text>

  <path d="M 810 855 L 870 855" class="line-persist" marker-end="url(#arrowpers)"/>

  <rect x="870" y="815" width="150" height="80" class="box-persistent" rx="6"/>
  <text x="945" y="840" class="text-label" text-anchor="middle">autoDream</text>
  <text x="890" y="865" class="text-tiny">24h schedule</text>
  <text x="890" y="880" class="text-tiny">Consolidate</text>

  <path d="M 1020 855 L 1080 855" class="line-session" marker-end="url(#arrowsess)"/>

  <rect x="1080" y="815" width="150" height="80" class="box-session" rx="6"/>
  <text x="1155" y="840" class="text-label" text-anchor="middle">COMPACT</text>
  <text x="1100" y="865" class="text-tiny">9 sections</text>
  <text x="1100" y="880" class="text-tiny">!mem refs</text>

  <path d="M 1230 855 L 1290 855" class="line-reactive" marker-end="url(#arrowreact)"/>

  <rect x="1290" y="815" width="150" height="80" class="box-reactive" rx="6"/>
  <text x="1365" y="840" class="text-label" text-anchor="middle">AppState</text>
  <text x="1310" y="865" class="text-tiny">Reactive UI</text>
  <text x="1310" y="880" class="text-tiny">Update</text>

  <!-- Feedback loop -->
  <path d="M 1365 895 Q 1365 950 1155 950 Q 945 950 525 895" class="line-flow" marker-end="url(#arrowflow)" stroke-dasharray="4,4"/>
  <text x="900" y="970" class="text-small">Feedback Loop (memory improves over time)</text>

  <!-- SECTION 9: Interconnections Grid -->
  <text x="30" y="1030" class="text-heading">SYSTEM INTERCONNECTIONS</text>

  <rect x="30" y="1055" width="800" height="140" class="box-secondary" rx="6"/>

  <text x="50" y="1080" class="text-small">• Memdir ↔ Team Sync: Delta push on extraction</text>
  <text x="50" y="1100" class="text-small">• SessionMemory ↔ autoDream: Threshold trigger at 10K+5K+3n</text>
  <text x="50" y="1120" class="text-small">• autoDream ↔ Memdir: Write consolidated insights back</text>
  <text x="50" y="1140" class="text-small">• Context Compaction ↔ Memdir: Inject selected memories (!mem prefix)</text>

  <rect x="880" y="1055" width="1050" height="140" class="box-secondary" rx="6"/>

  <text x="900" y="1080" class="text-small">Memory Hierarchy (by durability):</text>
  <text x="900" y="1100" class="text-small">Level 1 (Ephemeral): SessionMemory → AppState (current session only)</text>
  <text x="900" y="1120" class="text-small">Level 2 (Persistent Local): Memdir → autoDream consolidation → MEMORY.md</text>
  <text x="900" y="1140" class="text-small">Level 3 (Persistent Remote): Team Memory Sync (SHA256 delta, 44 gitleaks rules)</text>

</svg>
